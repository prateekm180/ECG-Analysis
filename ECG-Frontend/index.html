<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>CORVIS | Medical Grade ECG Digitizer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
      /* Global Smooth Scrolling and Custom Scrollbar */
      html {
        scroll-behavior: smooth;
        background-color: #050505;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: #050505;
      }

      ::-webkit-scrollbar-thumb {
        background: #222;
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #ef4444; /* Red pulse on hover */
      }

      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        background-color: #050505;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
